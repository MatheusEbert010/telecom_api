name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    # Executa a esteira basica de qualidade em ambiente limpo.
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        # Instala dependencias de execucao e de desenvolvimento para lint e testes.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Executar lint
        run: ruff check app tests

      - name: Executar testes
        run: python -m pytest

  auditoria_dependencias:
    # Audita vulnerabilidades conhecidas nas dependencias Python.
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Auditar dependencias
        run: pip-audit -r requirements.txt --strict

  build_docker:
    # Garante que as imagens principais do projeto continuem buildando em ambiente limpo.
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v5

      - name: Gerar imagem da API
        run: docker build -t telecom-api-ci .

      - name: Gerar imagem do MySQL
        run: docker build -t telecom-api-mysql-ci ./docker/mysql

  seguranca_imagens:
    # Varre as imagens geradas no CI para bloquear vulnerabilidades altas e criticas.
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v5

      - name: Gerar imagem da API para analise
        run: docker build -t telecom-api-scan .

      - name: Exportar imagem da API
        run: docker save telecom-api-scan -o telecom-api-scan.tar

      - name: Varrer imagem da API com Trivy
        run: >
          docker run --rm
          -v "${{ github.workspace }}:/work"
          get.trivy.dev/image/trivy:0.68.1
          image
          --input /work/telecom-api-scan.tar
          --severity HIGH,CRITICAL
          --ignore-unfixed
          --exit-code 1

      - name: Gerar imagem do MySQL para analise
        run: docker build -t telecom-api-mysql-scan ./docker/mysql

      - name: Exportar imagem do MySQL
        run: docker save telecom-api-mysql-scan -o telecom-api-mysql-scan.tar

      - name: Varrer imagem do MySQL com Trivy
        run: >
          docker run --rm
          -v "${{ github.workspace }}:/work"
          get.trivy.dev/image/trivy:0.68.1
          image
          --input /work/telecom-api-mysql-scan.tar
          --severity HIGH,CRITICAL
          --ignore-unfixed
          --exit-code 0

  integracao_mysql:
    # Valida migrations e fluxos criticos contra MySQL real e Redis ativo.
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
      SECRET_KEY: test-secret-key-with-minimum-32chars-123
      DATABASE_URL: mysql+pymysql://telecom_user:telecom_app_ci_2026@127.0.0.1:3306/telecom_api_ci
      ENVIRONMENT: test
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_DB: 0
      RUN_MYSQL_INTEGRATION_TESTS: "1"

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: telecom_api_ci
          MYSQL_USER: telecom_user
          MYSQL_PASSWORD: telecom_app_ci_2026
          MYSQL_ROOT_PASSWORD: root_ci_2026_secure
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot_ci_2026_secure --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Aguardar MySQL
        run: |
          python - <<'PY'
          import os
          import time
          from sqlalchemy import create_engine, text

          engine = create_engine(os.environ["DATABASE_URL"], pool_pre_ping=True)
          for attempt in range(30):
              try:
                  with engine.connect() as connection:
                      connection.execute(text("SELECT 1"))
                  print("MySQL pronto para uso")
                  break
              except Exception as exc:
                  if attempt == 29:
                      raise RuntimeError("MySQL nao ficou pronto a tempo") from exc
                  time.sleep(2)
          PY

      - name: Aplicar migrations
        run: python -m alembic upgrade head

      - name: Executar testes de integracao com MySQL
        run: python -m pytest tests/test_mysql_integration.py
