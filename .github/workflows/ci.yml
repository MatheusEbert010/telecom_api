name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    # Executa a esteira basica de qualidade em ambiente limpo.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # Instala dependencias de execucao e de desenvolvimento para lint e testes.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check app tests

      - name: Run tests
        run: pytest
