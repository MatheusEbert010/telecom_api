services:
  - type: web
    name: telecom-api
    runtime: docker
    plan: free
    repo: https://github.com/MatheusEbert010/telecom_api.git
    branch: main
    autoDeployTrigger: checksPass
    healthCheckPath: /api/v1/health/ready
    envVars:
      - key: PORT
        value: "10000"
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: REDIS_HOST
        value: localhost
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_DB
        value: "0"
      - key: CORS_ORIGINS
        sync: false
      - key: LOG_TO_FILE
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: HEALTH_EXPOSE_VERSION
        value: "false"
      - key: TRUST_CLIENT_REQUEST_ID
        value: "false"
      - key: UVICORN_PROXY_HEADERS
        value: "1"
      - key: UVICORN_FORWARDED_ALLOW_IPS
        value: "*"
